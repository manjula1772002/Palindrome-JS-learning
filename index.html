<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palindrome</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="min-h-screen bg-green-50 flex items-center justify-center p-6">
    <main class="w-full max-w-xl rounded-[2rem] border border-slate-200 bg-white px-8 py-10 shadow-[0_24px_60px_rgba(15,23,42,0.12)]">
      <h1 class="text-4xl font-semibold tracking-tight text-slate-900">Palindrome Checker</h1>

      <label for="input" class="mt-6 block text-sm font-semibold text-slate-900">Enter text</label>
      <input id="input" type="text" placeholder="word " class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-900 outline-none transition duration-200 focus:border-green-500 focus:ring-4 focus:ring-green-100" />

      <button id="check" type="button" class="mt-6 w-full rounded-2xl bg-green-600 px-4 py-3 text-base font-semibold text-white shadow-sm transition duration-200 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 focus:ring-offset-slate-50">Check palindrome</button>
      <p id="result" class="mt-4 min-h-[1.5rem] text-base font-semibold"></p>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
